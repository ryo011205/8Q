<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>⚾ 九九ピッチャーゲーム</title>

<style>

body{
font-family:sans-serif;
text-align:center;
background:#eef4ff;
}

.grid{
display:grid;
grid-template-columns:repeat(3,110px);
gap:10px;
justify-content:center;
margin:20px;
}

.cell{
border:2px solid #333;
height:90px;
font-size:34px;
display:flex;
align-items:center;
justify-content:center;
background:white;
cursor:pointer;
}

.cell:hover{background:#cfe3ff;}

.correct{background:#7cff8a;}
.wrong{background:#ff8a8a;}

#question{
font-size:36px;
margin:20px;
}

#info{
font-size:20px;
margin:10px;
}

</style>
</head>

<body>

<h1>⚾ 九九ピッチャーゲーム</h1>

計算
<select id="operator">
<option value="+">＋</option>
<option value="-">−</option>
<option value="*">×</option>
<option value="/">÷</option>
</select>

基の数
<select id="base"></select>

<br><br>

<button onclick="startGame()">プレイ</button>

<div id="info"></div>

<div id="question"></div>

<div class="grid" id="grid"></div>

<h2 id="result"></h2>

<script>

let answer
let startTime

let strike=0
let ball=0
let out=0
let hit=0

let pitchCount=0
let total=0

for(let i=1;i<=9;i++){
let opt=document.createElement("option")
opt.value=i
opt.textContent=i
document.getElementById("base").appendChild(opt)
}

function startGame(){

strike=0
ball=0
pitchCount=0

document.getElementById("result").innerText=""

nextPitch()

}

function nextPitch(){

if(out>=3){
document.getElementById("question").innerText="🎉 ナイスピッチ！"
return
}

if(hit>=4){
document.getElementById("question").innerText="ノックアウト💀"
return
}

if(pitchCount>=7){
startGame()
return
}

if(total>=42){
document.getElementById("question").innerText="終了"
return
}

pitchCount++
total++

createProblem()

}

function createProblem(){

const base=parseInt(document.getElementById("base").value)
const op=document.getElementById("operator").value

let n=Math.floor(Math.random()*9)+1

if(op=="+"){

answer=base+n
question=base+" + "+n

}

if(op=="-"){

answer=base-n
question=base+" − "+n

}

if(op=="*"){

answer=base*n
question=base+" × "+n

}

if(op=="/"){

answer=n
let numerator=base*n

question=numerator+" ÷ "+base

}

document.getElementById("question").innerText=question

drawGrid()

startTime=Date.now()

updateInfo()

}

function drawGrid(){

const grid=document.getElementById("grid")
grid.innerHTML=""

let nums=[]

while(nums.length<8){

let r=Math.floor(Math.random()*81)+1

if(!nums.includes(r)) nums.push(r)

}

nums.push(answer)

nums=nums.sort(()=>Math.random()-0.5)

nums.forEach(v=>{

let div=document.createElement("div")
div.className="cell"
div.textContent=v

div.onclick=()=>check(v,div)

grid.appendChild(div)

})

}

function check(v,cell){

let time=(Date.now()-startTime)/1000

if(v==answer){

if(time<=2){

strike++
cell.classList.add("correct")
document.getElementById("result").innerText="ストライク！"

}else{

ball++
cell.classList.add("correct")
document.getElementById("result").innerText="ボール"

}

}else{

hit++
cell.classList.add("wrong")
document.getElementById("result").innerText="ヒット！"

}

judge()

setTimeout(nextPitch,800)

}

function judge(){

if(strike>=3){

out++
document.getElementById("result").innerText="アウト！"
pitchCount=7

}

if(ball>=4){

hit++
document.getElementById("result").innerText="フォアボール"
pitchCount=7

}

updateInfo()

}

function updateInfo(){

document.getElementById("info").innerText=
"ストライク:"+strike+
" ボール:"+ball+
" アウト:"+out+
" ヒット:"+hit

}

</script>

</body>
</html>
