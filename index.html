<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>投算⚾️打語ゲーム</title>

<style>

body{
font-family:sans-serif;
text-align:center;
background:#eef4ff;
}

h1{
font-size:34px;
}

.grid{
display:grid;
grid-template-columns:repeat(3,110px);
gap:10px;
justify-content:center;
margin:20px;
}

.cell{
border:2px solid #333;
height:90px;
font-size:40px;
display:flex;
align-items:center;
justify-content:center;
background:white;
cursor:pointer;
}

.cell:hover{
background:#cfe3ff;
}

.correct{background:#7cff8a;}
.wrong{background:#ff8a8a;}

button{
font-size:18px;
padding:8px 14px;
margin:5px;
}

#question{
font-size:26px;
margin:20px;
}

#spelling{
font-size:24px;
margin:10px;
letter-spacing:5px;
}

</style>
</head>

<body>

<h1>⚾ ピッチャー vs バッター</h1>

モード
<select id="mode">
<option value="pitcher">ピッチャー（計算）</option>
<option value="upper">バッター（大文字）</option>
<option value="lower">バッター（小文字）</option>
<option value="word">バッター（英単語）</option>
</select>

<br><br>

<button onclick="startGame()">プレイ</button>

<div id="question"></div>
<div id="spelling"></div>

<div class="grid" id="grid"></div>

<h2 id="result"></h2>

<script>

let answer=""
let spelling=""
let input=""

const words=[
"dog","cat","apple","book","fish","cake","milk","bird","star","tree"
]

function startGame(){

input=""
document.getElementById("spelling").innerText=""
document.getElementById("result").innerText=""

const mode=document.getElementById("mode").value

if(mode=="pitcher") createMath()
if(mode=="upper") createUpper()
if(mode=="lower") createLower()
if(mode=="word") createWord()

}

function createMath(){

let a=Math.floor(Math.random()*10)
let b=Math.floor(Math.random()*10)

answer=(a+b).toString()

document.getElementById("question").innerText=a+" + "+b+" = ?"

let nums=[]

while(nums.length<8){

nums.push(Math.floor(Math.random()*18).toString())

}

nums.push(answer)
nums=nums.sort(()=>Math.random()-0.5)

drawGrid(nums,checkMath)

}

function checkMath(v,cell){

if(v==answer){
cell.classList.add("correct")
document.getElementById("result").innerText="ストライク！"
}else{
cell.classList.add("wrong")
document.getElementById("result").innerText="ボール"
}

setTimeout(startGame,1000)

}

function createUpper(){

const alphabet="ABCDEFGHIJKLMNOPQRSTUVWXYZ"

answer=alphabet[Math.floor(Math.random()*26)]

document.getElementById("question").innerText=
"この文字を探せ！ "+answer

let letters=alphabet.split("").sort(()=>Math.random()-0.5).slice(0,8)

letters.push(answer)
letters=letters.sort(()=>Math.random()-0.5)

drawGrid(letters,checkLetter)

}

function createLower(){

const alphabet="abcdefghijklmnopqrstuvwxyz"

answer=alphabet[Math.floor(Math.random()*26)]

document.getElementById("question").innerText=
"この文字を探せ！ "+answer

let letters=alphabet.split("").sort(()=>Math.random()-0.5).slice(0,8)

letters.push(answer)
letters=letters.sort(()=>Math.random()-0.5)

drawGrid(letters,checkLetter)

}

function checkLetter(v,cell){

if(v==answer){
cell.classList.add("correct")
document.getElementById("result").innerText="ヒット！"
}else{
cell.classList.add("wrong")
document.getElementById("result").innerText="アウト"
}

setTimeout(startGame,1000)

}

function createWord(){

answer=words[Math.floor(Math.random()*words.length)]

spelling=answer
input=""

document.getElementById("question").innerText=
"英単語を完成させよう"

updateSpelling()

let letters=spelling.split("")

const alphabet="abcdefghijklmnopqrstuvwxyz"

while(letters.length<9){

letters.push(alphabet[Math.floor(Math.random()*26)])

}

letters=letters.sort(()=>Math.random()-0.5)

drawGrid(letters,checkWord)

}

function updateSpelling(){

let display=""

for(let i=0;i<spelling.length;i++){

if(i<input.length) display+=input[i]+" "
else display+="_ "

}

document.getElementById("spelling").innerText=display

}

function checkWord(v,cell){

input+=v

updateSpelling()

if(input.length>=spelling.length){

if(input==spelling){

cell.classList.add("correct")
document.getElementById("result").innerText="ホームラン！"

}else{

document.getElementById("result").innerText="アウト"

}

setTimeout(startGame,1200)

}

}

function drawGrid(list,callback){

const grid=document.getElementById("grid")
grid.innerHTML=""

list.forEach(v=>{

const div=document.createElement("div")
div.className="cell"
div.textContent=v

div.onclick=()=>callback(v,div)

grid.appendChild(div)

})

}

</script>

</body>
</html>
