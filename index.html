<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>8Q⚾</title>
<style>
body{font-family:sans-serif;text-align:center;background:#1a6fa8;color:white;}
#grid{display:grid;grid-template-columns:repeat(3,80px);gap:5px;justify-content:center;}
.cell{background:#eee;color:black;padding:20px;cursor:pointer;}
.correct{background:#06d6a0;}
.wrong{background:#e63946;color:white;}
#timer-bar{height:10px;background:linear-gradient(90deg,#e85d04,#ffd60a,#06d6a0);}
</style>
</head>

<body>

<h1>⚾8Q⚾</h1>

<div id="op-select">
<button class="op-btn" data-op="+">＋</button>
<button class="op-btn" data-op="-">−</button>
<button class="op-btn" data-op="*">×</button>
<button class="op-btn" data-op="/">÷</button>
</div>

<select id="difficulty">
<option value="3000">ソフト</option>
<option value="2000" selected>ノーマル</option>
<option value="1200">ハード</option>
</select>

<div id="question-box" onclick="startGame()">プレイボール！</div>
<div id="timer-bar"></div>
<div id="grid"></div>
<div id="result"></div>

<script>

// ===== 音（必須）=====
const soundStrike = new Audio("https://actions.google.com/sounds/v1/sports/baseball_hit.ogg");
const soundHit = new Audio("https://actions.google.com/sounds/v1/impacts/wood_plank_flicks.ogg");
const soundClear = new Audio("https://actions.google.com/sounds/v1/crowds/cheer.ogg");
const soundOver = new Audio("https://actions.google.com/sounds/v1/crowds/boo.ogg");

// ===== 状態 =====
let op = '+';
let correctAnswer;
let timer;
let startTime;
let hits = 0;

// ===== 演算選択 =====
document.querySelectorAll('.op-btn').forEach(btn=>{
  btn.onclick=()=>op=btn.dataset.op;
});

// ===== 開始 =====
function startGame(){
  hits=0;
  nextQuestion();
}

// ===== 問題 =====
function genQuestion(){
  let a,b,ans;
  if(op==='+'){a=rand(1,50);b=rand(1,50);ans=a+b;}
  if(op==='-'){a=rand(1,50);b=rand(1,a);ans=a-b;}
  if(op==='*'){a=rand(1,9);b=rand(1,9);ans=a*b;}
  if(op==='/'){b=rand(1,9);ans=rand(1,9);a=b*ans;}
  return {a,b,ans};
}

function rand(min,max){
  return Math.floor(Math.random()*(max-min+1))+min;
}

// ===== 出題 =====
function nextQuestion(){
  const {a,b,ans}=genQuestion();
  correctAnswer=ans;

  document.getElementById("question-box").textContent=`${a} ${op} ${b}`;

  const choices=[ans];
  while(choices.length<9){
    let n=ans+rand(-10,10);
    if(!choices.includes(n)&&n>=0)choices.push(n);
  }

  const grid=document.getElementById("grid");
  grid.innerHTML="";
  choices.sort(()=>Math.random()-0.5);

  choices.forEach(c=>{
    const div=document.createElement("div");
    div.className="cell";
    div.textContent=c;
    div.onclick=()=>answer(c,div);
    grid.appendChild(div);
  });

  startTimer();
}

// ===== タイマー =====
function startTimer(){
  clearInterval(timer);
  const duration=parseInt(document.getElementById("difficulty").value);
  const bar=document.getElementById("timer-bar");

  startTime=Date.now();

  timer=setInterval(()=>{
    let t=Date.now()-startTime;
    bar.style.width=(100-t/duration*100)+"%";
    if(t>=duration){
      clearInterval(timer);
      hit();
    }
  },50);
}

// ===== 回答 =====
function answer(val,cell){
  clearInterval(timer);

  if(val===correctAnswer){
    cell.classList.add("correct");
    strike();
  }else{
    cell.classList.add("wrong");
    hit();
  }
}

// ===== 結果 =====
function strike(){
  soundStrike.currentTime=0;
  soundStrike.play().catch(()=>{});
  nextQuestion();
}

function hit(){
  soundHit.currentTime=0;
  soundHit.play().catch(()=>{});
  hits++;

  if(hits>=4){
    gameOver();
  }else{
    nextQuestion();
  }
}

function gameOver(){
  soundOver.play().catch(()=>{});
  alert("ゲームオーバー");
}

</script>
</body>
</html>
