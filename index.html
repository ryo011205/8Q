<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>8Q⚾</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Boogaloo&family=M+PLUS+Rounded+1c:wght@400;700;900&display=swap');

  :root {
    --sky: #1a6fa8;
    --grass: #2d7d3a;
    --dirt: #c8834a;
    --white: #f5f0e8;
    --strike-col: #ffd60a;
    --ball-col: #06d6a0;
    --hit-col: #f72585;
    --out-col: #e63946;
    --shadow: rgba(0,0,0,0.35);
    --cell-bg: #e8dfc8;
    --cell-border: #b8a880;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'M PLUS Rounded 1c', sans-serif;
    background: var(--sky);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    position: relative;
  }

  /* 草 */
  .grass-strip {
    position: absolute;
    bottom: 0;
    width: 100%;
    height: 80px;
    background: linear-gradient(to bottom, var(--grass), #1a5226);
    border-radius: 0;
  }

  #game-wrapper {
    position: relative;
    z-index: 10;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 14px;
    padding: 10px;
  }

  /* タイトル */
  h1 {
    font-family: 'Boogaloo', cursive;
    font-size: 2.4rem;
    color: var(--white);
    text-shadow: 3px 3px 0 #0a3d62, 0 0 20px rgba(255,200,0,0.5);
    letter-spacing: 2px;
  }
  h1 span { color: #ffd60a; }

  /* 演算選択 */
  #op-select {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
    justify-content: center;
  }
  .op-btn {
    background: var(--white);
    border: 3px solid #0a3d62;
    border-radius: 12px;
    padding: 8px 20px;
    font-size: 1.4rem;
    font-family: 'Boogaloo', cursive;
    cursor: pointer;
    transition: all 0.15s;
    box-shadow: 3px 3px 0 #0a3d62;
    color: #0a3d62;
  }
  .op-btn:hover { transform: translate(-2px,-2px); box-shadow: 5px 5px 0 #0a3d62; }
  .op-btn.active { background: #ffd60a; border-color: #e85d04; box-shadow: 3px 3px 0 #e85d04; }

  /* メインエリア */
  #main-area {
    display: flex;
    align-items: flex-start;
    gap: 18px;
  }

  /* 問題＋グリッド */
  #left-area {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 10px;
  }

  /* 問題パネル */
  #question-box {
    background: rgba(255,255,255,0.95);
    border: 4px solid #0a3d62;
    border-radius: 18px;
    padding: 12px 28px;
    font-size: 2rem;
    font-weight: 900;
    color: #0a3d62;
    min-width: 260px;
    text-align: center;
    box-shadow: 4px 4px 0 #0a3d62;
    position: relative;
  }
  #timer-bar-wrap {
    width: 100%;
    height: 8px;
    background: #ddd;
    border-radius: 4px;
    margin-top: 8px;
    overflow: hidden;
  }
  #timer-bar {
    height: 100%;
    width: 100%;
    background: linear-gradient(90deg, #06d6a0, #ffd60a, #e85d04);
    border-radius: 4px;
    transition: width 0.05s linear;
  }

  /* 結果フラッシュ */
  #result-flash {
    font-family: 'Boogaloo', cursive;
    font-size: 2.2rem;
    font-weight: 900;
    min-height: 72px;
    text-align: center;
    line-height: 1.3;
    text-shadow: 2px 2px 0 rgba(0,0,0,0.3);
    animation: popIn 0.3s ease-out;
    letter-spacing: 2px;
  }
  @keyframes popIn {
    0% { transform: scale(0.5); opacity:0; }
    70% { transform: scale(1.15); }
    100% { transform: scale(1); opacity:1; }
  }

  /* グリッドは前面に */
  #grid { position: relative; z-index: 1; }

  #grid {
    display: grid;
    grid-template-columns: repeat(3,1fr);
    gap: 8px;
  }
  .cell {
    width: 88px;
    height: 88px;
    background: var(--cell-bg);
    border: 3px solid var(--cell-border);
    border-radius: 14px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 1.6rem;
    font-weight: 900;
    color: #2d3436;
    cursor: pointer;
    transition: all 0.12s;
    box-shadow: 3px 3px 0 var(--cell-border);
    user-select: none;
  }
  .cell:hover:not(.disabled) { transform: translate(-2px,-2px); box-shadow: 5px 5px 0 var(--cell-border); }
  .cell.correct { background: #06d6a0; border-color: #029a72; color: white; animation: flash 0.4s ease; }
  .cell.wrong   { background: #e63946; border-color: #9b1c1c; color: white; animation: shake 0.4s ease; }
  .cell.disabled { cursor: default; }
  @keyframes flash { 0%{transform:scale(1)} 40%{transform:scale(1.12)} 100%{transform:scale(1)} }
  @keyframes shake { 0%{transform:translateX(0)} 25%{transform:translateX(-6px)} 75%{transform:translateX(6px)} 100%{transform:translateX(0)} }

  /* スコアボード（右側） */
  #scoreboard {
    background: rgba(10,61,98,0.85);
    border: 3px solid var(--white);
    border-radius: 18px;
    padding: 14px 16px;
    min-width: 130px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 12px;
    box-shadow: 4px 4px 0 rgba(0,0,0,0.3);
  }

  /* BSO カウンター */
  .bso-area { width: 100%; display: flex; flex-direction: column; gap: 8px; }
  .bso-row {
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .bso-letter {
    font-family: 'Boogaloo', cursive;
    font-size: 1.3rem;
    font-weight: 900;
    width: 18px;
    text-align: left;
    flex-shrink: 0;
  }
  .ball-letter   { color: var(--ball-col); }
  .strike-letter { color: var(--strike-col); }
  .out-letter    { color: var(--out-col); }

  .bs-dots { display: flex; gap: 6px; }
  .bs-dot {
    width: 18px; height: 18px;
    border-radius: 50%;
    border: 2px solid rgba(255,255,255,0.4);
    background: transparent;
    transition: all 0.2s;
  }
  .bs-dot.strike-lit { background: var(--strike-col); border-color: var(--strike-col); box-shadow: 0 0 6px var(--strike-col); }
  .bs-dot.ball-lit   { background: var(--ball-col);   border-color: var(--ball-col);   box-shadow: 0 0 6px var(--ball-col); }
  .bs-dot.out-lit    { background: var(--out-col);    border-color: var(--out-col);    box-shadow: 0 0 6px var(--out-col); }

  /* ダイヤモンド */
  .diamond-label {
    font-family: 'Boogaloo', cursive;
    font-size: 0.85rem;
    color: var(--hit-col);
    letter-spacing: 1px;
    margin-bottom: 2px;
  }
  .diamond-field {
    position: relative;
    width: 90px;
    height: 90px;
  }
  .base {
    position: absolute;
    width: 20px; height: 20px;
    background: transparent;
    border: 3px solid rgba(255,255,255,0.4);
    transform: rotate(45deg);
    transition: all 0.25s;
  }
  .base.home  { bottom: 2px; left: 50%; transform: translateX(-50%) rotate(45deg); }
  .base.first { right: 4px; top: 50%; transform: translateY(-50%) rotate(45deg); }
  .base.second{ top: 2px; left: 50%; transform: translateX(-50%) rotate(45deg); }
  .base.third { left: 4px; top: 50%; transform: translateY(-50%) rotate(45deg); }
  .base.hit-lit { background: var(--hit-col); border-color: var(--hit-col); box-shadow: 0 0 8px var(--hit-col); }

  /* 区切り線 */
  .divider {
    width: 100%;
    height: 2px;
    background: rgba(255,255,255,0.2);
    border-radius: 1px;
  }

  /* 問題ボックス：スタート待機中はクリッカブル強調 */
  #question-box.waiting {
    cursor: pointer;
    background: #ffd60a;
    color: #0a3d62;
    border-color: #e85d04;
    box-shadow: 4px 4px 0 #e85d04;
    animation: pulse 1.2s ease-in-out infinite;
  }
  #question-box.waiting:hover { transform: translate(-2px,-2px); box-shadow: 6px 6px 0 #e85d04; }
  @keyframes pulse {
    0%,100% { box-shadow: 4px 4px 0 #e85d04; }
    50% { box-shadow: 4px 4px 0 #e85d04, 0 0 18px rgba(255,214,10,0.6); }
  }

  /* オーバーレイ */
  #overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.75);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    z-index: 100;
    gap: 18px;
  }
  #overlay h2 {
    font-family: 'Boogaloo', cursive;
    font-size: 3.5rem;
    color: #ffd60a;
    text-shadow: 4px 4px 0 #e85d04;
    animation: bigPop 0.5s ease-out;
  }
  @keyframes bigPop {
    0%{transform:scale(0);opacity:0}
    70%{transform:scale(1.2)}
    100%{transform:scale(1);opacity:1}
  }
  #overlay p { color: var(--white); font-size: 1.2rem; text-align: center; }
  #overlay button {
    font-family: 'Boogaloo', cursive;
    font-size: 1.4rem;
    padding: 10px 32px;
    border: 3px solid #ffd60a;
    border-radius: 14px;
    background: #ffd60a;
    color: #0a3d62;
    cursor: pointer;
    box-shadow: 4px 4px 0 #e85d04;
  }
  #overlay { display: none; }
  #overlay.show { display: flex; }

  /* 問題カウント */
  #q-count {
    font-family: 'Boogaloo', cursive;
    color: rgba(255,255,255,0.7);
    font-size: 0.9rem;
  }
</style>
</head>
<body>

<div class="grass-strip"></div>

<div id="game-wrapper">
  <h1>⚾ <span>8Q</span> ⚾</h1>

  <!-- 演算選択 -->
  <div id="op-select">
    <button class="op-btn active" data-op="+">たし算 ＋</button>
    <button class="op-btn" data-op="-">ひき算 −</button>
    <button class="op-btn" data-op="*">かけ算 ×</button>
    <button class="op-btn" data-op="/">わり算 ÷</button>
  </div>

  <!-- メインエリア -->
  <div id="main-area">
    <div id="left-area">
      <!-- 問題 -->
      <div id="question-box" id="question-box" onclick="handleQBoxClick()">
        ⚾ プレイボール！
        <div id="timer-bar-wrap"><div id="timer-bar"></div></div>
      </div>
      <div id="result-flash">&nbsp;</div>
      <!-- 9マス -->
      <div id="grid"></div>
      <div id="q-count">&nbsp;</div>
    </div>

    <!-- スコアボード -->
    <div id="scoreboard">
      <div class="bso-area">
        <div class="bso-row">
          <span class="bso-letter ball-letter">B</span>
          <div class="bs-dots">
            <div class="bs-dot" id="b0"></div>
            <div class="bs-dot" id="b1"></div>
            <div class="bs-dot" id="b2"></div>
            <div class="bs-dot" id="b3"></div>
          </div>
        </div>
        <div class="bso-row">
          <span class="bso-letter strike-letter">S</span>
          <div class="bs-dots">
            <div class="bs-dot" id="s0"></div>
            <div class="bs-dot" id="s1"></div>
            <div class="bs-dot" id="s2"></div>
          </div>
        </div>
        <div class="bso-row">
          <span class="bso-letter out-letter">O</span>
          <div class="bs-dots">
            <div class="bs-dot" id="out0"></div>
            <div class="bs-dot" id="out1"></div>
            <div class="bs-dot" id="out2"></div>
          </div>
        </div>
      </div>

      <div class="divider"></div>

      <div class="diamond-label">HIT</div>
      <div class="diamond-field">
        <div class="base second" id="base2"></div>
        <div class="base third"  id="base3"></div>
        <div class="base first"  id="base1"></div>
        <div class="base home"   id="base0"></div>
      </div>

    </div>
  </div>

  </div>

<!-- ゲームオーバー / クリアオーバーレイ -->
<div id="overlay">
  <h2 id="overlay-title">ナイスピッチ！</h2>
  <p id="overlay-msg">素晴らしい！</p>
  <button onclick="restartGame()">🔄 もう一度</button>
</div>

<script>
// ===== 状態 =====
let op = '+';
let strikes = 0, balls = 0;
let outs = 0, hits = 0;
let questionCount = 0; // 現在の7問カウント
let correctAnswer = 0;
let timerInterval = null;
let startTime = 0;
let gameActive = false;
let cellsDisabled = false;

// ===== 演算選択 =====
document.querySelectorAll('.op-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.op-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    op = btn.dataset.op;
  });
});

// ===== プレイボールボックス（スタート兼用） =====
function handleQBoxClick() {
  if (!gameActive) startGame();
}

function startGame() {
  strikes = 0; balls = 0; outs = 0; hits = 0; questionCount = 0;
  gameActive = true;
  document.getElementById('question-box').classList.remove('waiting');
  updateScoreboard();
  updateOutCircles();
  updateDiamond();
  document.getElementById('overlay').classList.remove('show');
  nextQuestion();
}

// ===== 問題生成 =====
function genQuestion() {
  let a, b, ans;
  if (op === '+') {
    a = rand(1,50); b = rand(1,50); ans = a + b;
  } else if (op === '-') {
    a = rand(5,50); b = rand(1, a); ans = a - b;
  } else if (op === '*') {
    a = rand(1,9); b = rand(1,9); ans = a * b;
  } else {
    b = rand(1,9); ans = rand(1,9); a = b * ans;
  }
  return { a, b, ans };
}

function rand(min, max) {
  return Math.floor(Math.random() * (max - min + 1)) + min;
}

// ===== 選択肢生成 =====
function genChoices(ans) {
  const choices = new Set([ans]);
  const range = Math.max(5, Math.floor(ans * 0.5));
  while (choices.size < 9) {
    let c = ans + rand(-range, range);
    if (c !== ans && c >= 0) choices.add(c);
  }
  return shuffle([...choices]);
}

function shuffle(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i+1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}

// ===== 問題表示 =====
function nextQuestion() {
  if (!gameActive) return;
  cellsDisabled = false;
  clearTimer();
  const { a, b, ans } = genQuestion();
  correctAnswer = ans;
  questionCount++;

  const opSymbol = { '+':'+', '-':'−', '*':'×', '/':'÷' }[op];
  document.getElementById('question-box').innerHTML =
    `<span>${a} ${opSymbol} ${b}</span>
     <div id="timer-bar-wrap"><div id="timer-bar"></div></div>`;
  document.getElementById('result-flash').innerHTML = '&nbsp;';
  document.getElementById('q-count').textContent = `問題 ${questionCount} / 7`;

  const choices = genChoices(ans);
  const grid = document.getElementById('grid');
  grid.innerHTML = '';
  choices.forEach(c => {
    const cell = document.createElement('div');
    cell.className = 'cell';
    cell.textContent = c;
    cell.addEventListener('click', () => onAnswer(c, cell));
    grid.appendChild(cell);
  });

  startTime = Date.now();
  startTimerBar();
}

// ===== タイマーバー =====
function startTimerBar() {
  const duration = 2000; // 2秒
  const bar = () => document.getElementById('timer-bar');
  let elapsed = 0;
  timerInterval = setInterval(() => {
    elapsed += 50;
    const pct = Math.max(0, 100 - (elapsed / duration * 100));
    if (bar()) bar().style.width = pct + '%';
    if (elapsed >= duration) {
      clearTimer();
   
      // 時間切れ → 無回答ヒット
      if (!cellsDisabled) {
        cellsDisabled = true;
        document.querySelectorAll('.cell').forEach(c => {
          c.classList.add('disabled');
          if (parseInt(c.textContent) === correctAnswer) c.classList.add('correct');
        });
        handleResult('hit');
      }
    }
  }, 50);
}

function clearTimer() {
  if (timerInterval) { clearInterval(timerInterval); timerInterval = null; }
}

// ===== 回答処理 =====
function onAnswer(value, cell) {
  if (cellsDisabled || !gameActive) return;
  cellsDisabled = true;
  clearTimer();
  document.querySelectorAll('.cell').forEach(c => c.classList.add('disabled'));

  const elapsed = Date.now() - startTime;
  if (value === correctAnswer) {
    cell.classList.add('correct');
    if (elapsed <= 3000) {
      handleResult('strike');
    } else {
      handleResult('ball');
    }
  } else {
    cell.classList.add('wrong');
    // 正解セルも光らせる
    document.querySelectorAll('.cell').forEach(c => {
      if (parseInt(c.textContent) === correctAnswer) c.classList.add('correct');
    });
    if (elapsed > 3000) {
      handleResult('2basehit');
    } else {
      handleResult('hit');
    }
  }
}

// ===== 結果ハンドリング =====
function handleResult(type) {
  const flash = document.getElementById('result-flash');
  if (type === 'strike') {
    flash.textContent = 'STRIKE！🔥';
    flash.style.color = '#ffd60a';
    strikes++;
  } else if (type === 'ball') {
    flash.textContent = 'BALL⚡️';
    flash.style.color = '#06d6a0';
    balls++;
  } else if (type === '2basehit') {
    flash.textContent = '2BASE HIT！💥';
    flash.style.color = '#ff9f43';
    hits += 2;
  } else {
    flash.textContent = 'HIT！💣';
    flash.style.color = '#ff6b6b';
    hits++;
  }

  // アウト判定
  if (strikes >= 3) {
    strikes = 0; balls = 0;
    outs++;
    questionCount = 0;
    updateScoreboard();
    updateOutCircles();
    updateDiamond();

    // エンドチェック（アウト3回でゲームクリア）
    if (outs >= 3) {
      setTimeout(() => endGame('nice'), 700);
      return;
    }

    // ストラックアウト！表示してからネクストバッターへ
    const flash = document.getElementById('result-flash');
    flash.innerHTML = 'STRIKE OUT！⚾<br><span style="font-size:1.4rem;color:#fff;">⚾ NEXT BATTER</span>';
    flash.style.color = '#e63946';
    setTimeout(nextQuestion, 1800);
    return;
  }

  // 7問カウント内でボール4回 → 「HIT」（追加のヒット）
  if (balls >= 4) {
    strikes = 0; balls = 0;
    hits++;
    questionCount = 0;
    setTimeout(() => showMini('フォアボール❌', '#f72585'), 100);
  }

  updateScoreboard();
  updateOutCircles();
  updateDiamond();

  // ヒット4回でゲームオーバー
  if (hits >= 4) {
    setTimeout(() => endGame('over'), 700);
    return;
  }

  // 7問カウントリセット（スト3/ボール4に満たない場合）
  if (questionCount >= 7) {
    strikes = 0; balls = 0;
    questionCount = 0;
    updateScoreboard();
  }

  setTimeout(nextQuestion, 1000);
}

function showMini(text, color) {
  const flash = document.getElementById('result-flash');
  flash.textContent = text;
  flash.style.color = color;
}

// ===== スコアボード更新 =====
function updateScoreboard() {
  // ストライク（3個まで）
  for (let i = 0; i < 3; i++) {
    const el = document.getElementById('s' + i);
    el.className = 'bs-dot' + (i < strikes ? ' strike-lit' : '');
  }
  // ボール（4個まで）
  for (let i = 0; i < 4; i++) {
    const el = document.getElementById('b' + i);
    el.className = 'bs-dot' + (i < balls ? ' ball-lit' : '');
  }
}

function updateOutCircles() {
  for (let i = 0; i < 3; i++) {
    const el = document.getElementById('out' + i);
    el.className = 'bs-dot' + (i < outs ? ' out-lit' : '');
  }
}

function updateDiamond() {
  // ヒット順：1本目=1塁(右)→2塁(上)→3塁(左)→本塁(下)
  const order = [
    { id: 'base1', cls: 'first'  },
    { id: 'base2', cls: 'second' },
    { id: 'base3', cls: 'third'  },
    { id: 'base0', cls: 'home'   },
  ];
  order.forEach(({ id, cls }, i) => {
    const el = document.getElementById(id);
    el.className = 'base ' + cls + (i < hits ? ' hit-lit' : '');
  });
}

function updateScore() {
  document.getElementById('score-num').textContent = score;
}

// ===== ゲーム終了 =====
function endGame(type) {
  gameActive = false;
  clearTimer();
  document.getElementById('question-box').classList.add('waiting');
  const overlay = document.getElementById('overlay');
  const title = document.getElementById('overlay-title');
  const msg = document.getElementById('overlay-msg');
  overlay.classList.add('show');
  if (type === 'nice') {
    title.textContent = '🏆NICE PITCH！';
    title.style.color = '#ffd60a';
    msg.textContent = `シャットアウト！良い投球だ！`;
  } else {
    title.textContent = ' KNOCK OUT！💥';
    title.style.color = '#ff6b6b';
    msg.textContent = `失点した😵降板だ…`;
  }
}

function restartGame() {
  // 全状態リセット
  strikes = 0; balls = 0; outs = 0; hits = 0; questionCount = 0;
  gameActive = false;
  clearTimer();
  updateScoreboard();
  updateOutCircles();
  updateDiamond();

  // グリッドをクリア
  document.getElementById('grid').innerHTML = '';
  document.getElementById('result-flash').innerHTML = '&nbsp;';
  document.getElementById('q-count').textContent = '&nbsp;';

  // 問題ボックスをプレイボール表示に戻す
  document.getElementById('question-box').innerHTML =
    `⚾ プレイボール！<div id="timer-bar-wrap"><div id="timer-bar" style="width:100%"></div></div>`;
  document.getElementById('question-box').classList.add('waiting');

  // オーバーレイを閉じる
  document.getElementById('overlay').classList.remove('show');
}

// 初期化
updateScoreboard();
updateOutCircles();
updateDiamond();
document.getElementById('question-box').classList.add('waiting');
</script>
</body>
