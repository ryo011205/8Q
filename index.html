<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>計算野球ゲーム</title>

<style>

body{
font-family:sans-serif;
text-align:center;
}

#question{
font-size:40px;
margin:20px;
}

#status{
font-size:22px;
margin:10px;
}

.grid{
display:grid;
grid-template-columns:repeat(3,100px);
gap:10px;
justify-content:center;
}

.cell{
width:100px;
height:100px;
font-size:35px;
background:#eee;
border-radius:10px;
display:flex;
align-items:center;
justify-content:center;
cursor:pointer;
}

button{
font-size:18px;
padding:10px 20px;
margin:5px;
}

</style>
</head>

<body>

<h2>計算野球ゲーム ⚾</h2>

<div id="modeSelect">
<button onclick="startGame('batter')">バッターモード</button>
</div>

<div id="question"></div>
<div id="status"></div>
<div class="grid" id="grid"></div>
<div id="result"></div>

<script>

let correctAnswer
let startTime

let windowQuestion=0
let wrongCount=0
let windowStart

let totalWrong=0
let outs=0

let homerun=0
let doubleHit=0
let singleHit=0

function startGame(){

document.getElementById("modeSelect").style.display="none"

resetWindow()
newQuestion()

}

function resetWindow(){

windowQuestion=0
wrongCount=0
windowStart=Date.now()

}

function newQuestion(){

let a=Math.floor(Math.random()*10)
let b=Math.floor(Math.random()*10)

correctAnswer=a+b

document.getElementById("question").innerText=a+" + "+b

createGrid()

startTime=Date.now()

}

function createGrid(){

let grid=document.getElementById("grid")
grid.innerHTML=""

let numbers=[]

while(numbers.length<8){

let n=Math.floor(Math.random()*19)

if(n!=correctAnswer && !numbers.includes(n)){
numbers.push(n)
}

}

numbers.push(correctAnswer)

numbers.sort(()=>Math.random()-0.5)

numbers.forEach(num=>{

let div=document.createElement("div")
div.className="cell"
div.innerText=num
div.onclick=()=>answer(num)

grid.appendChild(div)

})

}

function answer(num){

windowQuestion++

if(num!=correctAnswer){

wrongCount++
totalWrong++

document.getElementById("status").innerText="ストライク"

}

checkRules()

}

function checkRules(){

// 9ミス → ゲームオーバー
if(totalWrong>=9){

finish("3アウト！ゲームオーバー")
return

}

// 6問以内3ミス → 1アウト
if(wrongCount>=3){

outs++

document.getElementById("status").innerText="1アウト"

resetWindow()

}

// 6問終了
if(windowQuestion>=6){

let time=(Date.now()-windowStart)/1000

let message=""

if(wrongCount==0){

if(time<=7){

message="HOME RUN！"
homerun++

}else if(time<=9){

message="2BASE hit"
doubleHit++

}

}

if(wrongCount<=2){

if(time<=8){

message="hit"
singleHit++

}else if(time<=10){

message="four balls"
singleHit++

}

}

document.getElementById("status").innerText=message+" "+time.toFixed(2)+"秒"

resetWindow()

}

// クリア判定
if(
homerun>=1 ||
doubleHit>=2 ||
(doubleHit>=1 && singleHit>=2) ||
singleHit>=4
){

finish("クリア！！")
return

}

newQuestion()

}

function finish(msg){

document.getElementById("result").innerText=msg
document.getElementById("grid").innerHTML=""
document.getElementById("question").innerText=""

}

</script>

</body>
</html>
