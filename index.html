<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>計算野球ゲーム</title>

<style>

body{
font-family:sans-serif;
background:#f4f4f4;
text-align:center;
}

#judge{
font-size:36px;
height:50px;
color:red;
}

.centerArea{
display:flex;
justify-content:center;
align-items:center;
margin-top:20px;
}

.boardArea{
display:flex;
flex-direction:column;
align-items:center;
}

#question{
font-size:42px;
margin-bottom:15px;
}

.grid{
display:grid;
grid-template-columns:repeat(3,110px);
gap:12px;
}

.cell{
width:110px;
height:110px;
background:white;
border-radius:12px;
font-size:34px;
display:flex;
align-items:center;
justify-content:center;
cursor:pointer;
position:relative;
}

.mark{
position:absolute;
font-size:48px;
}

.correct{color:red}
.wrong{color:blue}

.bsoArea{
margin-left:50px;
font-size:22px;
text-align:left;
}

.bsoRow{
display:flex;
align-items:center;
margin:6px 0;
}

.bsoLabel{
width:20px;
}

.light{
width:22px;
height:22px;
border-radius:50%;
background:#ddd;
margin-left:5px;
}

button{
font-size:20px;
padding:10px 20px;
margin-top:20px;
}

</style>
</head>

<body>

<h2>計算野球ゲーム ⚾</h2>

<button onclick="playBall()">プレイボール</button>

<div id="judge"></div>

<div class="centerArea">

<div class="boardArea">

<div id="question"></div>

<div class="grid" id="grid"></div>

</div>

<div class="bsoArea">

<div class="bsoRow">
<div class="bsoLabel">B</div>
<div class="light" id="b1"></div>
<div class="light" id="b2"></div>
<div class="light" id="b3"></div>
</div>

<div class="bsoRow">
<div class="bsoLabel">S</div>
<div class="light" id="s1"></div>
<div class="light" id="s2"></div>
</div>

<div class="bsoRow">
<div class="bsoLabel">O</div>
<div class="light" id="o1"></div>
<div class="light" id="o2"></div>
</div>

</div>

</div>

<div id="result"></div>

<script>

let correctAnswer
let startTime

function playBall(){

newQuestion()

}

function newQuestion(){

let a=Math.floor(Math.random()*10)
let b=Math.floor(Math.random()*10)

correctAnswer=a+b

document.getElementById("question").innerText=a+" + "+b

createGrid()

startTime=Date.now()

}

function createGrid(){

let grid=document.getElementById("grid")
grid.innerHTML=""

let nums=[]

while(nums.length<8){

let n=Math.floor(Math.random()*19)

if(n!=correctAnswer && !nums.includes(n)) nums.push(n)

}

nums.push(correctAnswer)
nums.sort(()=>Math.random()-0.5)

nums.forEach(n=>{

let d=document.createElement("div")
d.className="cell"
d.innerText=n

d.onclick=()=>answer(d,n)

grid.appendChild(d)

})

}

function answer(cell,n){

if(n==correctAnswer){

showMark(cell,"◯","correct")

}else{

showMark(cell,"×","wrong")

}

setTimeout(newQuestion,600)

}

function showMark(cell,symbol,type){

let m=document.createElement("div")
m.className="mark "+type
m.innerText=symbol

cell.appendChild(m)

}

</script>

</body>
</html>
