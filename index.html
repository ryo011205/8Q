<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>計算野球ゲーム</title>

<style>

body{
font-family:sans-serif;
text-align:center;
background:#f2f2f2;
}

#judge{
font-size:42px;
font-weight:bold;
color:red;
height:50px;
}

#question{
font-size:40px;
margin:10px;
}

.gameArea{
position:relative;
display:inline-block;
}

.grid{
display:grid;
grid-template-columns:repeat(3,100px);
gap:10px;
padding:20px;

background-image:url("https://upload.wikimedia.org/wikipedia/commons/thumb/8/8c/Baseball_catcher_silhouette.svg/512px-Baseball_catcher_silhouette.svg.png");
background-size:240px;
background-repeat:no-repeat;
background-position:center;
}

.cell{
width:100px;
height:100px;
font-size:34px;
font-weight:bold;
background:rgba(255,255,255,0.9);
border-radius:10px;
display:flex;
align-items:center;
justify-content:center;
cursor:pointer;
}

.cell:hover{
background:#ddd;
}

#scoreboard{
position:absolute;
right:-120px;
bottom:0;
text-align:left;
font-size:20px;
}

.circle{
font-size:24px;
color:#ccc;
}

.active{
color:red;
}

.base{
margin-top:15px;
font-size:30px;
}

.base span{
color:#ccc;
}

.runner{
color:orange;
}

</style>
</head>

<body>

<h2>計算野球ゲーム ⚾</h2>

<button onclick="startGame()">スタート</button>

<div id="judge"></div>

<div id="question"></div>

<div class="gameArea">

<div class="grid" id="grid"></div>

<div id="scoreboard">

<div>
B:
<span class="circle" id="b1">●</span>
<span class="circle" id="b2">●</span>
<span class="circle" id="b3">●</span>
</div>

<div>
S:
<span class="circle" id="s1">●</span>
<span class="circle" id="s2">●</span>
</div>

<div>
O:
<span class="circle" id="o1">●</span>
<span class="circle" id="o2">●</span>
<span class="circle" id="o3">●</span>
</div>

<div class="base">

<span id="b3base">◆</span><br>
<span id="b2base">◆</span> <span id="b1base">◆</span>

</div>

</div>

</div>

<div id="result"></div>

<script>

let correctAnswer

let windowQuestion=0
let wrongCount=0
let windowStart

let strikeCount=0
let outCount=0

let base1=false
let base2=false
let base3=false

function startGame(){

resetWindow()
newQuestion()

}

function resetWindow(){

windowQuestion=0
wrongCount=0
windowStart=Date.now()

}

function newQuestion(){

let a=Math.floor(Math.random()*10)
let b=Math.floor(Math.random()*10)

correctAnswer=a+b

document.getElementById("question").innerText=a+" + "+b

createGrid()

}

function createGrid(){

let grid=document.getElementById("grid")
grid.innerHTML=""

let numbers=[]

while(numbers.length<8){

let n=Math.floor(Math.random()*19)

if(n!=correctAnswer && !numbers.includes(n)){
numbers.push(n)
}

}

numbers.push(correctAnswer)

numbers.sort(()=>Math.random()-0.5)

numbers.forEach(num=>{

let div=document.createElement("div")
div.className="cell"
div.innerText=num
div.onclick=()=>answer(num)

grid.appendChild(div)

})

}

function answer(num){

windowQuestion++

if(num!=correctAnswer){

wrongCount++
strikeCount++

showJudge("STRIKE")

document.getElementById("s"+strikeCount).classList.add("active")

}else{

strikeCount=0

}

checkRules()

}

function checkRules(){

if(wrongCount>=3){

outCount++

showJudge("OUT")

document.getElementById("o"+outCount).classList.add("active")

resetWindow()

}

if(windowQuestion>=6){

let time=(Date.now()-windowStart)/1000

if(wrongCount==0 && time<=7){

showJudge("HOME RUN！")

base1=false
base2=false
base3=false

}

else if(wrongCount==0 && time<=9){

showJudge("2BASE hit")

advanceRunner(2)

}

else if(wrongCount<=2 && time<=8){

showJudge("hit")

advanceRunner(1)

}

else if(wrongCount<=2 && time<=10){

showJudge("four balls")

advanceRunner(1)

}

resetWindow()

updateBases()

}

newQuestion()

}

function advanceRunner(base){

if(base==1){

if(base3){
base3=false
}

if(base2){
base3=true
base2=false
}

if(base1){
base2=true
}

base1=true

}

if(base==2){

base3=base1
base2=true
base1=false

}

}

function updateBases(){

document.getElementById("b1base").className=base1?"runner":""
document.getElementById("b2base").className=base2?"runner":""
document.getElementById("b3base").className=base3?"runner":""

}

function showJudge(text){

document.getElementById("judge").innerText=text

setTimeout(()=>{
document.getElementById("judge").innerText=""
},1200)

}

</script>

</body>
</html>
